services:
  lifeos:
    # 生产：拉取 GitHub Actions 自动构建的镜像
    image: ghcr.io/elemenx-king/lifeos:latest
    # 本地开发：注释掉 image，取消注释 build
    # build: .
    container_name: lifeos
    ports:
      - "8080:3000"
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  watchtower:
    image: containrrr/watchtower
    container_name: lifeos-watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --cleanup --scope lifeos-stack lifeos
    restart: unless-stopped
